<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canecas & Cia — Loja</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <h1 class="logo">☕ Canecas & Cia</h1>
      <nav class="nav">
        <a href="#produtos">Produtos</a>
        <a href="#destaques">Destaques</a>
        <a href="admin.html">Admin</a>
      </nav>
      <button class="btn-carrinho" id="btnCarrinho">
        🛒 <span id="contadorCarrinho">0</span>
      </button>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>Sua caneca perfeita está aqui</h2>
      <p>Escolha entre dezenas de modelos exclusivos.</p>
    </div>
  </section>

  <main class="container">
    <section id="destaques">
      <h3 class="secao-titulo">Destaques</h3>
      <div class="grid-produtos" id="gridDestaques"></div>
    </section>

    <section id="produtos">
      <h3 class="secao-titulo">Todos os Produtos</h3>
      <div class="filtros">
        <button class="filtro-btn ativo" data-categoria="todos">Todos</button>
        <button class="filtro-btn" data-categoria="classica">Clássica</button>
        <button class="filtro-btn" data-categoria="geek">Geek</button>
        <button class="filtro-btn" data-categoria="personalizada">Personalizada</button>
      </div>
      <div class="grid-produtos" id="gridProdutos"></div>
    </section>
  </main>

  <aside class="carrinho" id="carrinho">
    <div class="carrinho-header">
      <h3>Seu Carrinho</h3>
      <button id="fecharCarrinho">✕</button>
    </div>
    <div class="carrinho-itens" id="carrinhoItens"></div>
    <div class="carrinho-total">
      <strong>Total: R$ <span id="totalCarrinho">0,00</span></strong>
      <button class="btn-finalizar">Finalizar Compra</button>
    </div>
  </aside>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Canecas & Cia — Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
