<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MugStore - Canecas Exclusivas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f9f9f9; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; }
        .carrinho-icon { font-size: 24px; cursor: pointer; }
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .produtos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card-produto { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; transition: transform 0.3s; display: flex; flex-direction: column; }
        .card-produto:hover { transform: translateY(-5px); }
        .card-produto img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-info h3 { font-size: 18px; margin-bottom: 10px; }
        .card-info p { color: #666; font-size: 14px; margin-bottom: 15px; }
        .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .preco { font-size: 20px; font-weight: bold; color: #e74c3c; }
        .btn-comprar { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-comprar:hover { background-color: #2980b9; }
        footer { text-align: center; padding: 20px; margin-top: 50px; background-color: #ecf0f1; }
        footer a { color: #3498db; text-decoration: none; }
        .vazio { grid-column: 1 / -1; text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

    <header>
        <h1>☕ MugStore</h1>
        <div class="carrinho-icon" title="Carrinho (Em desenvolvimento)">🛒 (0)</div>
    </header>

    <main>
        <div class="produtos-grid" id="grid-produtos">
            <!-- Os produtos serão injetados aqui via JavaScript -->
        </div>
    </main>

    <footer>
        <p>&copy; 2023 MugStore. <a href="admin.html">Acesso Administrativo</a></p>
    </footer>

    <script>
        // Inicializa produtos padrão caso o localStorage esteja vazio
        function inicializarDados() {
            if (!localStorage.getItem('mugstore_produtos')) {
                const produtosPadrao = [
                    { id: 1, nome: "Caneca Preta Clássica", preco: 29.90, imagem: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=500&q=80", descricao: "Caneca de cerâmica preta fosca, ideal para o dia a dia." },
                    { id: 2, nome: "Caneca de Café Especial", preco: 45.00, imagem: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=500&q=80", descricao: "Design moderno perfeito para apreciadores de café." },
                    { id: 3, nome: "Caneca Térmica Rosa", preco: 59.90, imagem: "https://images.unsplash.com/photo-1585664811087-47f65abbad64?w=500&q=80", descricao: "Mantém sua bebida quente por muito mais tempo." }
                ];
                localStorage.setItem('mugstore_produtos', JSON.stringify(produtosPadrao));
            }
        }

        function carregarProdutos() {
            inicializarDados();
            const grid = document.getElementById('grid-produtos');
            const produtos = JSON.parse(localStorage.getItem('mugstore_produtos'));
            
            grid.innerHTML = '';

            if (produtos.length === 0) {
                grid.innerHTML = '<div class="vazio"><h2>Nenhuma caneca disponível no momento.</h2></div>';
                return;
            }

            produtos.forEach(produto => {
                const card = document.createElement('div');
                card.className = 'card-produto';
                card.innerHTML = `
                    <img src="${produto.imagem}" alt="${produto.nome}" onerror="this.src='https://via.placeholder.com/300?text=Sem+Imagem'">
                    <div class="card-info">
                        <h3>${produto.nome}</h3>
                        <p>${produto.descricao}</p>
                        <div class="card-bottom">
                            <span class="preco">R$ ${produto.preco.toFixed(2)}</span>
                            <button class="btn-comprar" onclick="alert('Em breve sistema de pagamento!')">Comprar</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Executa ao carregar a página
        carregarProdutos();
    </script>
</body>
</html>
