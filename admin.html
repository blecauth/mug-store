<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanecaStore - Painel Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
      border-radius: 16px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .logo h1 {
      color: white;
      font-size: 24px;
      font-weight: 800;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }
    .nav-links a {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.25);
      color: white;
      font-weight: 700;
      text-decoration: none;
      display: inline-block;
      border: 2px solid rgba(255,255,255,0.5);
      transition: all 0.3s;
    }
    .nav-links a:hover {
      background: white;
      color: #ff6b6b;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .header h2 {
      font-size: 32px;
      color: #2d3436;
      margin-bottom: 4px;
    }
    .header p {
      color: #636e72;
    }
    .btn-add {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00b894, #00cec9);
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,184,148,0.3);
      transition: transform 0.2s;
    }
    .btn-add:hover {
      transform: scale(1.05);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      padding: 20px;
      border-radius: 16px;
      color: white;
    }
    .stat-card:nth-child(1) { background: linear-gradient(135deg, #667eea, #764ba2); }
    .stat-card:nth-child(2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .stat-card:nth-child(3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .stat-card div:first-child {
      font-size: 14px;
      opacity: 0.9;
    }
    .stat-card div:last-child {
      font-size: 32px;
      font-weight: 800;
      margin-top: 4px;
    }
    .table-wrap {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      padding: 16px;
      text-align: left;
      color: #2d3436;
      font-weight: 700;
      background: #f8f9fa;
    }
    td {
      padding: 16px;
      border-bottom: 1px solid #ecf0f1;
    }
    tr:hover {
      background: #f8f9fa;
    }
    td img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .btn-edit, .btn-delete {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-edit {
      background: #74b9ff;
      margin-right: 6px;
    }
    .btn-delete {
      background: #ff7675;
    }
    .btn-edit:hover, .btn-delete:hover {
      transform: scale(1.05);
    }
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal h3 {
      margin: 0 0 24px 0;
      font-size: 24px;
      color: #2d3436;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #636e72;
      font-weight: 600;
      font-size: 14px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #dfe6e9;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #00b894;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn-cancel {
      padding: 12px 24px;
      border: 2px solid #dfe6e9;
      background: white;
      color: #636e72;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save {
      padding: 12px 24px;
      border: none;
      background: linear-gradient(135deg, #00b894, #00cec9);
      color: white;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,184,148,0.3);
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      z-index: 2000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      display: none;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <div class="logo">
        <div class="logo-icon">☕</div>
        <h1>CanecaStore</h1>
      </div>
      <div class="nav-links">
        <a href="index.html">🛒 Loja</a>
      </div>
    </nav>

    <div class="header">
      <div>
        <h2>Painel Administrativo</h2>
        <p>Gerencie os produtos da loja</p>
      </div>
      <button class="btn-add" onclick="openModal()">➕ Adicionar Caneca</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div>Total de Produtos</div>
        <div id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div>Preço Médio</div>
        <div id="stat-media">R$ 0,00</div>
      </div>
      <div class="stat-card">
        <div>Maior Preço</div>
        <div id="stat-max">R$ 0,00</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Foto</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Preço</th>
            <th style="text-align:center;">Ações</th>
          </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modal-title">Adicionar Caneca</h3>
      <form id="product-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>URL da Imagem</label>
          <input type="text" id="input-img" required placeholder="https://...">
        </div>
        <div class="form-group">
          <label>Nome do Produto</label>
          <input type="text" id="input-nome" required placeholder="Ex: Caneca Geek">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="input-desc" required rows="3" placeholder="Descrição do produto..."></textarea>
        </div>
        <div class="form-group">
          <label>Preço (R$)</label>
          <input type="number" id="input-preco" required step="0.01" min="0" placeholder="29.90">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let produtos = JSON.parse(localStorage.getItem('canecastore_produtos')) || [
      {
        id: 1,
        nome: "Caneca Programador",
        descricao: "Caneca preta com a frase 'It works on my machine'. Perfeita para desenvolvedores!",
        preco: 39.90,
        imagem: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400&h=400&fit=crop"
      },
      {
        id: 2,
        nome: "Caneca Café & Código",
        descricao: "Caneca branca com estampa minimalista de xícara e código. Ideal para o café da manhã.",
        preco: 34.90,
        imagem: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&h=400&fit=crop"
      },
      {
        id: 3,
        nome: "Caneca Gamer",
        descricao: "Caneca com LED colorido e design gamer. Ilumina sua mesa enquanto você joga!",
        preco: 59.90,
        imagem: "https://images.unsplash.com/photo-1577937927133-66ef06acdf18?w=400&h=400&fit=crop"
      },
      {
        id: 4,
        nome: "Caneca Minimalista",
        descricao: "Design clean e elegante em tons pastel. Para quem gosta de simplicidade.",
        preco: 29.90,
        imagem: "https://images.unsplash.com/photo-1517256064527-09c73fc73e38?w=400&h=400&fit=crop"
      },
      {
        id: 5,
        nome: "Caneca Vintage",
        descricao: "Estilo retrô com estampa de café antigo. Perfeita para colecionadores.",
        preco: 44.90,
        imagem: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=400&h=400&fit=crop"
      },
      {
        id: 6,
        nome: "Caneca Mágica",
        descricao: "Muda de cor com líquido quente! Surpreenda seus amigos com essa caneca especial.",
        preco: 49.90,
        imagem: "https://images.unsplash.com/photo-1544787219-7f47ccb76574?w=400&h=400&fit=crop"
      }
    ];

    let nextId = Math.max(...produtos.map(p => p.id), 0) + 1;
    let editingId = null;

    function salvarProdutos() {
      localStorage.setItem('canecastore_produtos', JSON.stringify(produtos));
    }

    function renderAdmin() {
      const tbody = document.getElementById('admin-table-body');
      tbody.innerHTML = produtos.map(p => `
        <tr>
          <td><img src="${p.imagem}" alt="${p.nome}"></td>
          <td style="font-weight:600; color:#2d3436;">${p.nome}</td>
          <td style="color:#636e72; max-width:300px;">${p.descricao}</td>
          <td style="font-weight:700; color:#00b894;">R$ ${p.preco.toFixed(2).replace('.', ',')}</td>
          <td style="text-align:center;">
            <button class="btn-edit" onclick="editProduct(${p.id})">✏️ Editar</button>
            <button class="btn-delete" onclick="deleteProduct(${p.id})">🗑️ Remover</button>
          </td>
        </tr>
      `).join('');

      document.getElementById('stat-total').textContent = produtos.length;
      const media = produtos.length ? produtos.reduce((s, p) => s + p.preco, 0) / produtos.length : 0;
      document.getElementById('stat-media').textContent = 'R$ ' + media.toFixed(2).replace('.', ',');
      const max = produtos.length ? Math.max(...produtos.map(p => p.preco)) : 0;
      document.getElementById('stat-max').textContent = 'R$ ' + max.toFixed(2).replace('.', ',');
    }

    function openModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Adicionar Caneca';
      document.getElementById('product-form').reset();
      document.getElementById('edit-id').value = '';
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function editProduct(id) {
      const p = produtos.find(x => x.id === id);
      if (!p) return;
      editingId = id;
      document.getElementById('modal-title').textContent = 'Editar Caneca';
      document.getElementById('edit-id').value = id;
      document.getElementById('input-img').value = p.imagem;
      document.getElementById('input-nome').value = p.nome;
      document.getElementById('input-desc').value = p.descricao;
      document.getElementById('input-preco').value = p.preco;
      document.getElementById('modal').style.display = 'flex';
    }

    function saveProduct(e) {
      e.preventDefault();
      const img = document.getElementById('input-img').value;
      const nome = document.getElementById('input-nome').value;
      const desc = document.getElementById('input-desc').value;
      const preco = parseFloat(document.getElementById('input-preco').value);

      if (editingId) {
        const idx = produtos.findIndex(p => p.id === editingId);
        if (idx !== -1) {
          produtos[idx] = { ...produtos[idx], nome, descricao: desc, preco, imagem: img };
          showToast('✅ Produto atualizado com sucesso!', '#00b894');
        }
      } else {
        produtos.push({ id: nextId++, nome, descricao: desc, preco, imagem: img });
        showToast('✅ Produto adicionado com sucesso!', '#00b894');
      }

      salvarProdutos();
      closeModal();
      renderAdmin();
    }

    function deleteProduct(id) {
      if (!confirm('Tem certeza que deseja remover este produto?')) return;
      produtos = produtos.filter(p => p.id !== id);
      salvarProdutos();
      renderAdmin();
      showToast('🗑️ Produto removido!', '#ff7675');
    }

    function showToast(msg, color) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = color;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    salvarProdutos();
    renderAdmin();
  </script>
</body>
</html>
